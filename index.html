<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX | ULTRA GENESIS 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #00f3ff; --accent: #ff0070; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        
        /* محرك التمرير العمودي */
        .main-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; transition: 0.5s; }
        .main-engine::-webkit-scrollbar { display: none; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* الواجهة العلوية ونظام الـ XP */
        .top-interface { position: fixed; top: 0; width: 100%; z-index: 500; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .xp-track { width: 120px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 5px; position: relative; }
        #xp-fill { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: 1s ease-in-out; }

        /* العلامة المائية */
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-family: 'Orbitron'; font-size: 3.5rem; font-weight: 900; opacity: 0.08; pointer-events: none; z-index: 40; color: #fff; white-space: nowrap; text-shadow: 0 0 15px var(--neon); }

        /* التحكم الجانبي (يسار) */
        .action-hub { position: absolute; left: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .hub-btn { width: 55px; height: 55px; border-radius: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer; }
        .hub-btn:active { transform: scale(0.85); border-color: var(--neon); }
        .hub-btn.active i { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* شريط التنقل السفلي */
        .nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(30px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 600; }
        .upload-circle { width: 65px; height: 65px; background: #fff; color: #000; border-radius: 22px; display: flex; align-items: center; justify-content: center; transform: translateY(-15px); box-shadow: 0 10px 30px rgba(0,243,255,0.3); cursor: pointer; }

        /* النوافذ المنبثقة (دردشة + أدمن) */
        .overlay-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(30px); z-index: 2000; display: none; flex-direction: column; }
        
        /* الترتيب العشوائي */
        .shuffle-trigger { position: fixed; top: 85px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; z-index: 100; border: 1px solid rgba(0,243,243,0.2); }
    </style>
</head>
<body>

    <header class="top-interface">
        <div class="flex flex-col">
            <span id="rank-tag" class="text-[10px] font-black font-[Orbitron] text-cyan-400">LEVEL 1 [INITIATE]</span>
            <div class="xp-track"><div id="xp-fill"></div></div>
        </div>
        <h1 class="text-xl font-black italic font-[Orbitron] tracking-tighter">VORTEX</h1>
        <div class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center bg-white/5" onclick="openAd()">
            <i class="fas fa-bolt text-xs text-yellow-400"></i>
        </div>
    </header>

    <div class="shuffle-trigger" onclick="shuffleFeed()">
        <i class="fas fa-random text-xs text-cyan-400"></i>
    </div>

    <main class="main-engine" id="feed-container">
        <div class="h-full flex flex-col items-center justify-center">
            <i class="fas fa-sync fa-spin text-2xl text-cyan-400 mb-4"></i>
            <span class="text-[10px] font-[Orbitron] tracking-widest">LOADING_SYSTEM...</span>
        </div>
    </main>

    <nav class="nav-bar">
        <i class="fas fa-shield-halved opacity-40 hover:opacity-100 cursor-pointer" onclick="openAdmin()"></i>
        <i class="fas fa-comment-dots opacity-40 hover:opacity-100 cursor-pointer" onclick="toggleChat()"></i>
        <div class="upload-circle" id="upload-btn"><i class="fas fa-plus text-xl"></i></div>
        <i class="fas fa-share-nodes opacity-40 hover:opacity-100 cursor-pointer" onclick="shareVortex()"></i>
        <i class="fas fa-user-secret opacity-40 hover:opacity-100 cursor-pointer" onclick="openAd()"></i>
    </nav>

    <div id="chat-panel" class="overlay-panel">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <span class="text-cyan-400 font-[Orbitron] tracking-widest text-sm">SECURE_CHAT</span>
            <i class="fas fa-times text-xl p-2" onclick="toggleChat()"></i>
        </div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 bg-white/5 flex gap-3">
            <input type="text" id="chat-input" class="flex-1 bg-transparent border-none outline-none text-sm" placeholder="اكتب رسالة مشفرة...">
            <button onclick="sendMsg()"><i class="fas fa-paper-plane text-cyan-400"></i></button>
        </div>
    </div>

    <div id="admin-panel" class="overlay-panel">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <span class="text-red-500 font-[Orbitron] tracking-widest text-sm">ADMIN_TERMINAL</span>
            <i class="fas fa-times text-xl" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-grid" class="grid grid-cols-2 gap-4 p-6 overflow-y-auto"></div>
    </div>

    <script>
        const USER_KEY = localStorage.getItem('vortex_uid') || 'GHOST_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('vortex_uid', USER_KEY);
        let currentXP = parseInt(localStorage.getItem('vortex_xp')) || 0;

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. XP & Level System
        function addXP(val) {
            currentXP += val;
            localStorage.setItem('vortex_xp', currentXP);
            updateUI();
        }
        function updateUI() {
            const lvl = Math.floor(currentXP / 100) + 1;
            const prog = currentXP % 100;
            const titles = ["INITIATE", "OPERATIVE", "AGENT", "PHANTOM", "SHADOW_LORD"];
            document.getElementById('rank-tag').innerText = `LEVEL ${lvl} [${titles[Math.min(lvl-1, 4)]}]`;
            document.getElementById('xp-fill').style.width = prog + "%";
        }
        updateUI();

        // 2. Ads System
        const ADS = ["https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d", "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec"];
        let adIdx = 0;
        function openAd() { window.open(ADS[adIdx], '_blank'); adIdx = (adIdx + 1) % ADS.length; addXP(5); }

        // 3. Admin & Delete
        function openAdmin() { if(prompt("MASTER_CODE:") === "1234") { document.getElementById('admin-panel').style.display = 'flex'; loadAdmin(); } }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function loadAdmin() {
            db.ref('videos').once('value', s => {
                const g = document.getElementById('admin-grid'); g.innerHTML = '';
                const v = s.val(); if(v) Object.keys(v).forEach(id => {
                    const el = document.createElement('div'); el.className = 'relative aspect-[9/16] rounded-xl overflow-hidden bg-white/5';
                    el.innerHTML = `<video src="${v[id].url}" class="w-full h-full object-cover"></video>
                                    <div class="absolute inset-0 bg-red-600/40 flex items-center justify-center" onclick="delVid('${id}')"><i class="fas fa-trash"></i></div>`;
                    g.appendChild(el);
                });
            });
        }
        function delVid(id) { if(confirm('Delete?')) { db.ref(`videos/${id}`).remove(); loadAdmin(); } }

        // 4. Chat System
        function toggleChat() { 
            const p = document.getElementById('chat-panel'); 
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex'; 
            if(p.style.display === 'flex') openAd();
        }
        function sendMsg() {
            const i = document.getElementById('chat-input');
            if(i.value.trim()) { db.ref('global_chat').push({user: USER_KEY, text: i.value}); i.value = ''; addXP(1); }
        }
        db.ref('global_chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-messages'); b.innerHTML = '';
            const v = s.val(); if(v) Object.values(v).forEach(m => {
                b.innerHTML += `<div class="p-3 bg-white/5 rounded-xl border border-white/10"><span class="text-[9px] text-cyan-400 block">${m.user}</span><p class="text-sm">${m.text}</p></div>`;
            });
            b.scrollTop = b.scrollHeight;
        });

        // 5. Cloudinary & Video Management
        const widget = cloudinary.createUploadWidget({ cloudName: "dssk5tabb", uploadPreset: "bjebvo5p" }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, sender: USER_KEY, likes: 0, timestamp: Date.now() });
                addXP(50);
            }
        });
        document.getElementById("upload-btn").onclick = () => { openAd(); widget.open(); };

        // 6. Feed Engine
        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('feed-container');
            const data = snapshot.val(); if(!data) return;
            const items = Object.keys(data).map(id => ({ id, ...data[id] })).reverse();
            container.innerHTML = '';
            items.forEach((v) => {
                const sec = document.createElement('section');
                sec.className = 'video-card';
                sec.innerHTML = `
                    <div class="watermark">VORTEX ELITE</div>
                    <video loop playsinline src="${v.url}"></video>
                    <div class="action-hub">
                        <div class="hub-btn" onclick="toggleMute(this)"><i class="fas fa-volume-high"></i></div>
                        <div class="hub-btn ${v.likedBy && v.likedBy[USER_KEY] ? 'active' : ''}" onclick="handleLike('${v.id}')">
                            <i class="fas fa-heart"></i>
                            <span class="text-[10px] mt-1 font-bold">${v.likes || 0}</span>
                        </div>
                        <div class="hub-btn" onclick="toggleChat()"><i class="fas fa-comment"></i></div>
                        <div class="hub-btn" onclick="shareVortex()"><i class="fas fa-share-nodes"></i></div>
                    </div>`;
                container.appendChild(sec);
            });
            initScroll();
        });

        function handleLike(id) {
            openAd(); addXP(2);
            db.ref(`videos/${id}`).transaction(p => {
                if(p) {
                    if(!p.likedBy) p.likedBy = {};
                    if(p.likedBy[USER_KEY]) { p.likes--; delete p.likedBy[USER_KEY]; }
                    else { p.likes++; p.likedBy[USER_KEY] = true; }
                }
                return p;
            });
        }

        function shuffleFeed() {
            openAd();
            const cards = document.querySelectorAll('.video-card');
            if(cards.length) cards[Math.floor(Math.random()*cards.length)].scrollIntoView({behavior:'smooth'});
        }

        function toggleMute(btn) {
            const v = btn.closest('section').querySelector('video');
            v.muted = !v.muted;
            btn.querySelector('i').className = v.muted ? 'fas fa-volume-xmark text-red-500' : 'fas fa-volume-high text-cyan-400';
        }

        function initScroll() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting && v) {
                        v.play().catch(()=>{});
                        const colors = ['#00f3ff', '#ff00ff', '#00ffaa', '#ffff00'];
                        document.documentElement.style.setProperty('--neon', colors[Math.floor(Math.random()*colors.length)]);
                    } else if(v) { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-card').forEach(s => obs.observe(s));
        }

        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
        function shareVortex() { openAd(); navigator.share({title:'Vortex Ultra', url:window.location.href}); }
    </script>
</body>
</html>
