<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX | OBSIDIAN PRISM V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@500;900&family=Cairo:wght@300;700&display=swap');
        
        :root { --ion: #00fff2; --shadow: rgba(0, 255, 242, 0.4); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; transition: 0.5s ease; }
        
        .vortex-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vortex-engine::-webkit-scrollbar { display: none; }
        .unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

        /* العلامة المائية - تم الإصلاح لتكون فوق الفيديو */
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-family: 'Syncopate'; font-size: 3.5rem; font-weight: 900; opacity: 0.12; pointer-events: none; z-index: 50; color: #fff; white-space: nowrap; text-shadow: 0 0 15px var(--ion); }

        .header-glass { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(0,0,0,0.5); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; }
        .neon-title { font-family: 'Syncopate', sans-serif; background: linear-gradient(90deg, #fff, var(--ion)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 15px var(--shadow); }
        .quantum-clock { font-family: 'Orbitron'; font-size: 10px; padding: 4px 12px; background: rgba(255,255,255,0.03); border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); color: var(--ion); }

        .left-prism-hub { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 28px; z-index: 100; }
        .prism-btn { width: 58px; height: 58px; border-radius: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s; }
        .prism-btn:active { transform: scale(0.8); border-color: var(--ion); }
        .prism-btn.active i { color: var(--ion); filter: drop-shadow(0 0 8px var(--ion)); }

        .bottom-trinity { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 440px; height: 85px; background: rgba(0,0,0,0.8); backdrop-filter: blur(35px); border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .obsidian-upload { width: 72px; height: 72px; background: linear-gradient(135deg, var(--ion), #7d00ff); border-radius: 25px; display: flex; align-items: center; justify-content: center; transform: translateY(-22px) rotate(45deg); box-shadow: 0 15px 35px var(--shadow); border: 2px solid rgba(255,255,255,0.2); cursor: pointer; }
        .obsidian-upload i { transform: rotate(-45deg); font-size: 26px; color: #000; }

        /* نافذة الدردشة - تم الإصلاح */
        #chat-window { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 400px; background: rgba(10,10,10,0.9); backdrop-filter: blur(40px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); z-index: 1500; display: none; flex-direction: column; overflow: hidden; }
        
        #admin-panel { position: fixed; inset: 0; z-index: 2000; background: #000; display: none; padding: 30px; overflow-y: auto; }
    </style>
</head>
<body>

    <header class="header-glass">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold neon-title">VORTEX</h1>
            <div id="clock" class="quantum-clock">00:00:00</div>
        </div>
        <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-ping"></div>
    </header>

    <main class="vortex-engine" id="stream"></main>

    <div id="chat-window">
        <div class="p-4 border-b border-white/10 flex justify-between items-center">
            <span class="text-xs font-bold tracking-widest text-cyan-400">GHOST_CHAT</span>
            <i class="fas fa-chevron-down" onclick="toggleChat()"></i>
        </div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-4 bg-white/5 flex gap-2">
            <input id="chat-input" type="text" placeholder="اكتب شيئاً..." class="flex-1 bg-transparent border-none outline-none text-sm">
            <i class="fas fa-paper-plane text-cyan-400" onclick="sendMsg()"></i>
        </div>
    </div>

    <nav class="bottom-trinity">
        <div class="flex flex-col items-center opacity-40 hover:opacity-100 cursor-pointer" onclick="openAdmin()">
            <i class="fas fa-shield-halved text-xl"></i>
            <span class="text-[10px] font-black mt-1 uppercase">Admin</span>
        </div>
        <div class="obsidian-upload" id="upload-btn"><i class="fas fa-plus"></i></div>
        <div class="flex flex-col items-center opacity-40 hover:opacity-100 cursor-pointer" onclick="toggleChat()">
            <i class="fas fa-comment-nodes text-xl"></i>
            <span class="text-[10px] font-black mt-1 uppercase">Chat</span>
        </div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10 border-b border-white/5 pb-5">
            <h2 class="neon-title text-xl font-bold">SYSTEM_MANAGER</h2>
            <i class="fas fa-xmark text-2xl" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-grid" class="grid grid-cols-2 gap-6"></div>
    </div>

    <script>
        const CORE_ID = localStorage.getItem('v_obs_id') || 'USER_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('v_obs_id', CORE_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Clock & Audio Fix
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });

        // Admin & Delete
        function openAdmin() { if(prompt("MASTER_CODE:") === "1234") { document.getElementById('admin-panel').style.display = 'block'; loadAdmin(); } }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function loadAdmin() {
            db.ref('videos').once('value', s => {
                const g = document.getElementById('admin-grid'); g.innerHTML = '';
                const v = s.val(); if(v) Object.keys(v).forEach(id => {
                    const el = document.createElement('div'); el.className = 'relative aspect-[9/16] rounded-2xl overflow-hidden bg-white/5';
                    el.innerHTML = `<video src="${v[id].url}" class="w-full h-full object-cover"></video>
                                    <div class="absolute inset-0 bg-red-600/60 flex items-center justify-center" onclick="deleteEntry('${id}')"><i class="fas fa-trash"></i></div>`;
                    g.appendChild(el);
                });
            });
        }
        function deleteEntry(id) { if(confirm('Delete?')) { db.ref(`videos/${id}`).remove(); loadAdmin(); } }

        // Chat System
        function toggleChat() { 
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }
        function sendMsg() {
            const inp = document.getElementById('chat-input');
            if(inp.value) { db.ref('chat').push({ user: CORE_ID, text: inp.value }); inp.value = ''; }
        }
        db.ref('chat').limitToLast(20).on('value', s => {
            const box = document.getElementById('chat-messages'); box.innerHTML = '';
            const v = s.val(); if(v) Object.values(v).forEach(m => {
                box.innerHTML += `<div class="text-[11px]"><b class="text-cyan-400">${m.user}:</b> ${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // Upload
        const widget = cloudinary.createUploadWidget({ cloudName: "dssk5tabb", uploadPreset: "bjebvo5p" }, (err, res) => {
            if (!err && res.event === "success") db.ref('videos/').push({ url: res.info.secure_url, sender: CORE_ID, likes: 0 });
        });
        document.getElementById("upload-btn").onclick = () => widget.open();

        // Feed Engine
        db.ref('videos').on('value', (snapshot) => {
            const stream = document.getElementById('stream');
            const data = snapshot.val(); if(!data) return;
            stream.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const sec = document.createElement('section');
                sec.className = 'unit';
                sec.innerHTML = `
                    <div class="watermark text-center w-full">VORTEX ELITE</div>
                    <video loop playsinline src="${v.url}"></video>
                    <div class="left-prism-hub">
                        <div class="prism-btn" onclick="toggleMute(this)"><i class="fas fa-volume-high"></i></div>
                        <div class="prism-btn" onclick="handleLike('${id}')"><i class="fas fa-heart"></i></div>
                        <div class="prism-btn" onclick="navigator.share({url:window.location.href})"><i class="fas fa-share"></i></div>
                    </div>`;
                stream.appendChild(sec);
            });
            initScroll();
        });

        function toggleMute(btn) {
            const v = btn.closest('section').querySelector('video');
            v.muted = !v.muted;
            btn.querySelector('i').className = v.muted ? 'fas fa-volume-xmark text-red-400' : 'fas fa-volume-high text-cyan-400';
        }

        function initScroll() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting && v) v.play().catch(()=>{});
                    else if(v) { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.unit').forEach(s => obs.observe(s));
        }
    </script>
</body>
</html>
