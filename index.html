<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER_X | THE ELITE EXPERIENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <div id="loading" class="loading-overlay">
        <div class="loader-atom"></div>
        <div class="font-[Orbitron] neon-text mt-4 tracking-[5px]">SYNCING_AETHER...</div>
    </div>

    <header>
        <div class="flex items-center gap-4 cursor-pointer" onclick="fireAd(4)">
            <div class="logo-box"><i class="fas fa-atom text-black"></i></div>
            <span class="font-[Orbitron] font-black text-2xl tracking-widest neon-text">AETHER_X</span>
        </div>
        <div id="timer" class="font-[Orbitron] text-sm opacity-60 px-5 py-1.5 rounded-full glass-border">00:00:00</div>
    </header>

    <main class="viewport scroll-engine" id="feed"></main>

    <nav>
        <div class="nav-btn upload shadow-accent" id="upload-btn"><i class="fas fa-plus"></i></div>
        <div class="nav-btn shadow-neon" onclick="openAdmin()"><i class="fas fa-fingerprint"></i></div>
        <div class="nav-btn shadow-neon" onclick="toggleChat()"><i class="fas fa-satellite-dish"></i></div>
    </nav>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
