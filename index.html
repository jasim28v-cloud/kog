<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX | OBSIDIAN PRISM V2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@500;900&family=Cairo:wght@300;700&display=swap');
        
        :root { --ion: #00fff2; --shadow: rgba(0, 255, 242, 0.4); --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        
        /* محرك التمرير المطور */
        .vortex-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; scroll-behavior: smooth; }
        .vortex-engine::-webkit-scrollbar { display: none; }
        .unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; transition: opacity 0.8s ease; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

        /* شريط التقدم العلوي النيوني */
        #scroll-progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--ion); box-shadow: 0 0 15px var(--ion); z-index: 2000; width: 0%; transition: width 0.2s ease; }

        /* العلامة المائية */
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-family: 'Syncopate'; font-size: 3.5rem; font-weight: 900; opacity: 0.12; pointer-events: none; z-index: 50; color: #fff; white-space: nowrap; text-shadow: 0 0 15px var(--ion); }

        /* الهيدر الزجاجي المطور */
        .header-glass { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(0,0,0,0.4); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .neon-title { font-family: 'Syncopate', sans-serif; background: linear-gradient(90deg, #fff, var(--ion)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px var(--shadow)); }
        .quantum-clock { font-family: 'Orbitron'; font-size: 11px; color: var(--ion); letter-spacing: 1px; }

        /* الأزرار الجانبية الزجاجية */
        .left-prism-hub { position: absolute; left: 15px; bottom: 150px; display: flex; flex-direction: column; gap: 22px; z-index: 100; }
        .prism-btn { width: 52px; height: 52px; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s; position: relative; }
        .prism-btn:active { transform: scale(0.85); }
        .prism-btn i { font-size: 18px; transition: 0.3s; }
        .prism-btn.liked i { color: #ff0055; filter: drop-shadow(0 0 8px #ff0055); }
        .like-count { position: absolute; bottom: -18px; font-size: 10px; font-family: 'Orbitron'; color: #fff; }

        /* شريط التنقل السفلي */
        .bottom-trinity { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 420px; height: 80px; background: rgba(10,10,10,0.8); backdrop-filter: blur(35px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .obsidian-upload { width: 68px; height: 68px; background: #fff; color: #000; border-radius: 22px; display: flex; align-items: center; justify-content: center; transform: translateY(-15px); box-shadow: 0 10px 30px var(--shadow); cursor: pointer; border: 4px solid rgba(0,0,0,0.1); transition: 0.3s; }
        .obsidian-upload:hover { transform: translateY(-20px) scale(1.05); }

        /* نوافذ الدردشة والسيستم */
        .glass-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(30px); z-index: 2000; display: none; flex-direction: column; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); max-width: 85%; align-self: flex-start; }
    </style>
</head>
<body>

    <div id="scroll-progress"></div>

    <header class="header-glass">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold neon-title tracking-tighter">VORTEX</h1>
            <div id="clock" class="quantum-clock">00:00</div>
        </div>
        <div class="flex items-center gap-3">
             <i class="fas fa-signal text-[10px] text-emerald-400"></i>
             <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
        </div>
    </header>

    <main class="vortex-engine" id="stream" onscroll="updateProgress()"></main>

    <div id="chat-overlay" class="glass-overlay">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-cyan-400 font-bold tracking-widest text-xs font-[Orbitron]">CORE_NETWORK</span>
                <span class="text-[9px] opacity-50">متصل الآن بنظام التشفير</span>
            </div>
            <i class="fas fa-xmark text-2xl p-2" onclick="toggleChat()"></i>
        </div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col"></div>
        <div class="p-6 bg-white/5 flex gap-3">
            <input id="chat-input" type="text" placeholder="أرسل رسالة مشفرة..." class="flex-1 bg-transparent border-none outline-none text-sm">
            <button onclick="sendMsg()" class="w-10 h-10 rounded-full bg-cyan-500/20 flex items-center justify-center text-cyan-400">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="admin-panel" class="glass-overlay">
        <div class="p-8 flex justify-between items-center border-b border-white/5">
            <h2 class="neon-title text-xl font-bold">TERMINAL_MANAGER</h2>
            <i class="fas fa-times text-2xl" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-grid" class="grid grid-cols-2 gap-4 p-8 overflow-y-auto"></div>
    </div>

    <nav class="bottom-trinity">
        <div class="flex flex-col items-center opacity-40 hover:opacity-100 cursor-pointer transition-all" onclick="openAdmin()">
            <i class="fas fa-shield-halved text-xl"></i>
            <span class="text-[9px] font-black mt-1 uppercase">Admin</span>
        </div>
        <div class="obsidian-upload" id="upload-btn"><i class="fas fa-plus text-2xl"></i></div>
        <div class="flex flex-col items-center opacity-40 hover:opacity-100 cursor-pointer transition-all" onclick="toggleChat()">
            <i class="fas fa-comment-dots text-xl"></i>
            <span class="text-[9px] font-black mt-1 uppercase">Chat</span>
        </div>
    </nav>

    <script>
        const CORE_ID = localStorage.getItem('v_obs_id') || 'GHOST_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('v_obs_id', CORE_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // تحديث شريط التقدم والساعة
        function updateProgress() {
            const engine = document.getElementById('stream');
            const winScroll = engine.scrollTop;
            const height = engine.scrollHeight - engine.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("scroll-progress").style.width = scrolled + "%";
        }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}); }, 1000);

        // نظام الدردشة المطور
        function toggleChat() { 
            const overlay = document.getElementById('chat-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }
        function sendMsg() {
            const inp = document.getElementById('chat-input');
            if(inp.value.trim()) { db.ref('chat').push({ user: CORE_ID, text: inp.value, time: Date.now() }); inp.value = ''; }
        }
        db.ref('chat').limitToLast(15).on('value', s => {
            const box = document.getElementById('chat-messages'); box.innerHTML = '';
            const v = s.val(); if(v) Object.values(v).forEach(m => {
                const isMe = m.user === CORE_ID;
                box.innerHTML += `
                    <div class="chat-bubble ${isMe ? 'self-end bg-cyan-500/10 border-cyan-500/20' : ''}">
                        <span class="text-[9px] ${isMe ? 'text-cyan-400' : 'text-emerald-400'} font-bold block mb-1">${m.user}</span>
                        <p class="text-[12px] leading-relaxed">${m.text}</p>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // نظام الرفع السريع
        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dssk5tabb", 
            uploadPreset: "bjebvo5p",
            sources: ['local'], // فتح الاستوديو مباشرة
            clientAllowedFormats: ["video"],
            maxFileSize: 150000000 
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, sender: CORE_ID, likes: 0, likedBy: {} });
            }
        });
        document.getElementById("upload-btn").onclick = () => widget.open();

        // محرك العرض واللايكات
        db.ref('videos').on('value', (snapshot) => {
            const stream = document.getElementById('stream');
            const data = snapshot.val(); if(!data) return;
            stream.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const isLiked = v.likedBy && v.likedBy[CORE_ID];
                const sec = document.createElement('section');
                sec.className = 'unit';
                sec.innerHTML = `
                    <div class="watermark">VORTEX ELITE</div>
                    <video loop playsinline src="${v.url}"></video>
                    <div class="left-prism-hub">
                        <div class="prism-btn" onclick="toggleMute(this)"><i class="fas fa-volume-high"></i></div>
                        <div class="prism-btn ${isLiked ? 'liked' : ''}" onclick="handleLike('${id}')">
                            <i class="fas fa-heart"></i>
                            <span class="like-count">${v.likes || 0}</span>
                        </div>
                        <div class="prism-btn" onclick="navigator.share({url:window.location.href})"><i class="fas fa-share-nodes"></i></div>
                    </div>`;
                stream.appendChild(sec);
            });
            initScroll();
        });

        function handleLike(id) {
            const ref = db.ref(`videos/${id}`);
            ref.transaction(post => {
                if (post) {
                    if (!post.likedBy) post.likedBy = {};
                    if (post.likedBy[CORE_ID]) {
                        post.likes--;
                        delete post.likedBy[CORE_ID];
                    } else {
                        post.likes++;
                        post.likedBy[CORE_ID] = true;
                    }
                }
                return post;
            });
        }

        // تحسين الأداء عند التمرير
        function initScroll() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting && v) {
                        v.play().catch(()=>{});
                        e.target.style.opacity = "1";
                    } else if(v) { 
                        v.pause(); 
                        v.currentTime = 0;
                        e.target.style.opacity = "0.3";
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.unit').forEach(s => obs.observe(s));
        }

        function toggleMute(btn) {
            const v = btn.closest('section').querySelector('video');
            v.muted = !v.muted;
            btn.querySelector('i').className = v.muted ? 'fas fa-volume-xmark text-red-400' : 'fas fa-volume-high text-cyan-400';
        }

        // لوحة الإدارة
        function openAdmin() { if(prompt("MASTER_CODE:") === "1234") { document.getElementById('admin-panel').style.display = 'flex'; loadAdmin(); } }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function loadAdmin() {
            db.ref('videos').once('value', s => {
                const g = document.getElementById('admin-grid'); g.innerHTML = '';
                const v = s.val(); if(v) Object.keys(v).forEach(id => {
                    g.innerHTML += `<div class="relative aspect-[9/16] rounded-xl overflow-hidden bg-white/5 border border-white/10">
                        <video src="${v[id].url}" class="w-full h-full object-cover opacity-50"></video>
                        <div class="absolute inset-0 flex items-center justify-center" onclick="deleteEntry('${id}')"><i class="fas fa-trash text-red-500 text-2xl"></i></div>
                    </div>`;
                });
            });
        }
        function deleteEntry(id) { if(confirm('حذف هذا المقطع نهائياً؟')) { db.ref(`videos/${id}`).remove(); loadAdmin(); } }

        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
    </script>
</body>
</html>
