<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX | QUANTUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@300;700&display=swap');
        
        :root { --ion-color: #00f3ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; transition: 0.5s; }
        
        .quantum-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .quantum-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* العلامة المائية */
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-family: 'Orbitron'; font-size: 3rem; font-weight: 900; opacity: 0.1; pointer-events: none; white-space: nowrap; z-index: 10; color: #fff; }

        /* الزجاج الفخم */
        .glass-ui { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-glow { color: var(--ion-color); text-shadow: 0 0 15px var(--ion-color); }

        /* التوزيع الجانبي الاحترافي */
        .action-column { position: absolute; right: 20px; bottom: 160px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .action-btn { width: 52px; height: 52px; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); transition: 0.3s; }
        .action-btn:active { transform: scale(0.9); border-color: var(--ion-color); }

        /* شريط التحكم السفلي الثلاثي */
        .trinity-hub { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 420px; height: 80px; border-radius: 28px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .upload-diamond { width: 65px; height: 65px; background: var(--ion-color); color: #000; border-radius: 20px; display: flex; align-items: center; justify-content: center; transform: translateY(-15px) rotate(45deg); box-shadow: 0 10px 25px rgba(0, 243, 255, 0.4); }
        .upload-diamond i { transform: rotate(-45deg); font-size: 22px; }

        #admin-gate { position: fixed; inset: 0; z-index: 2000; background: #000; display: none; padding: 25px; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-[400] glass-ui p-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-black neon-glow" style="font-family:'Orbitron'">VORTEX</h1>
            <div id="digital-clock" class="px-3 py-1 bg-white/5 rounded-full border border-white/10 text-[11px] font-mono text-white/70">00:00:00</div>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[9px] uppercase tracking-widest opacity-50">Live_Protocol</span>
        </div>
    </header>

    <main class="quantum-engine" id="main-stack">
        <div class="h-full flex items-center justify-center">
            <div class="w-12 h-12 border-4 border-white/10 border-t-cyan-500 rounded-full animate-spin"></div>
        </div>
    </main>

    <nav class="trinity-hub glass-ui">
        <div class="flex flex-col items-center opacity-40 hover:opacity-100 transition-all" onclick="accessAdmin()">
            <i class="fas fa-shield-halved text-lg"></i>
            <span class="text-[9px] font-bold mt-1">ADMIN</span>
        </div>

        <div class="upload-diamond" id="btn-upload">
            <i class="fas fa-plus"></i>
        </div>

        <div class="flex flex-col items-center opacity-40 hover:opacity-100 transition-all" onclick="openChat()">
            <i class="fas fa-comment-dots text-lg"></i>
            <span class="text-[9px] font-bold mt-1">CHAT</span>
        </div>
    </nav>

    <div id="admin-gate">
        <div class="flex justify-between items-center mb-8">
            <span class="neon-glow font-bold">SYSTEM_MANAGER</span>
            <i class="fas fa-xmark text-2xl" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-grid" class="grid grid-cols-2 gap-4 overflow-y-auto h-[80vh]"></div>
    </div>

    <script>
        const MY_ID = localStorage.getItem('v_uid') || 'U_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('v_uid', MY_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Digital Clock Logic
        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000);

        // 2. Admin System
        function accessAdmin() {
            if(prompt("PASSWORD:") === "1234") {
                document.getElementById('admin-gate').style.display = 'block';
                loadAdminPanel();
            }
        }
        function closeAdmin() { document.getElementById('admin-gate').style.display = 'none'; }
        
        function loadAdminPanel() {
            db.ref('videos').once('value', s => {
                const grid = document.getElementById('admin-grid'); grid.innerHTML = '';
                const vids = s.val(); if(vids) Object.keys(vids).forEach(id => {
                    const box = document.createElement('div'); box.className = 'relative aspect-[9/16] rounded-xl overflow-hidden border border-white/10';
                    box.innerHTML = `<video src="${vids[id].url}" class="w-full h-full object-cover"></video>
                                     <button onclick="burnVid('${id}')" class="absolute inset-0 bg-red-600/60 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity"><i class="fas fa-trash"></i></button>`;
                    grid.appendChild(box);
                });
            });
        }
        function burnVid(id) { if(confirm('Delete?')) { db.ref(`videos/${id}`).remove(); loadAdminPanel(); } }

        // 3. Cloudinary Upload
        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dssk5tabb", uploadPreset: "bjebvo5p", sources: ['local', 'camera'] 
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, user: MY_ID, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("btn-upload").onclick = () => widget.open();

        // 4. Content Engine
        db.ref('videos').on('value', (snapshot) => {
            const stack = document.getElementById('main-stack');
            const data = snapshot.val(); if(!data) return;
            const items = Object.keys(data).map(id => ({ id, ...data[id] })).reverse();
            stack.innerHTML = '';
            
            items.forEach((v) => {
                const sec = document.createElement('section');
                sec.className = 'video-segment';
                sec.innerHTML = `
                    <div class="watermark">VORTEX ELITE</div>
                    <video loop playsinline src="${v.url}"></video>
                    
                    <div class="action-column">
                        <div class="action-btn" onclick="toggleVolume(this)">
                            <i class="fas fa-volume-high text-white/50"></i>
                        </div>
                        <div class="flex flex-col items-center gap-1" onclick="handleLike('${v.id}')">
                            <div class="action-btn">
                                <i class="fas fa-heart ${v.likedBy && v.likedBy[MY_ID] ? 'text-red-500' : 'text-white/50'}"></i>
                            </div>
                            <span class="text-[10px] font-bold">${v.likes || 0}</span>
                        </div>
                        <div class="action-btn" onclick="doShare()">
                            <i class="fas fa-share-nodes text-white/50"></i>
                        </div>
                    </div>
                `;
                stack.appendChild(sec);
            });
            initAutoPlay();
        });

        function toggleVolume(btn) {
            const v = btn.closest('section').querySelector('video');
            v.muted = !v.muted;
            btn.querySelector('i').className = v.muted ? 'fas fa-volume-xmark text-red-400' : 'fas fa-volume-high text-cyan-400';
        }

        function initAutoPlay() {
            const colors = ['#00f3ff', '#ff0055', '#00ffaa', '#7d00ff', '#ffff00'];
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        if(vid) vid.play().catch(()=>{});
                        // Change Ionic Color on Scroll
                        const randomColor = colors[Math.floor(Math.random() * colors.length)];
                        document.documentElement.style.setProperty('--ion-color', randomColor);
                    } else { if(vid) { vid.pause(); vid.currentTime = 0; } }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
        function doShare() { navigator.share({ title: 'VORTEX QUANTUM', url: window.location.href }); }
        function openChat() { alert("Chat system connecting..."); }
    </script>
</body>
</html>
