<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEΞUS_VØID | THE NEXT GEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { 
            --neon: #00f3ff; 
            --accent: #bc13fe;
            --bg: #010103; 
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(0, 243, 255, 0.1);
        }
        
        /* حماية فائقة */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        /* خلفية ديناميكية */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, #0a0a20 0%, #010103 100%);
            z-index: -1;
        }

        .viewport { max-width: 900px; margin: 90px auto; padding: 15px; display: flex; flex-direction: column; gap: 40px; }

        /* كارت الـ Nexus الفخم */
        .nexus-card { 
            width: 100%; background: var(--glass); border-radius: 40px; overflow: hidden; 
            border: 1px solid var(--border); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(25px); position: relative;
        }
        .nexus-card:hover { border-color: var(--neon); transform: scale(1.01); box-shadow: 0 0 30px rgba(0, 243, 255, 0.05); }

        .video-engine { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        /* حماية المشغل المتقدمة */
        video::-webkit-media-controls { display:none !important; }
        
        #video-details-ui { position: fixed; inset: 0; background: rgba(1, 1, 3, 0.98); z-index: 3000; display: none; flex-direction: column; overflow-y: auto; backdrop-filter: blur(50px); animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .nav-btn { 
            width: 65px; height: 65px; border-radius: 22px; background: var(--glass); 
            backdrop-filter: blur(15px); border: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 25px var(--neon); }
        .nav-btn.upload { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }

        header { position: fixed; top: 0; width: 100%; padding: 15px 25px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; background: rgba(1, 1, 3, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        nav { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        
        .loading-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .loader-ring { width: 60px; height: 60px; border: 3px solid transparent; border-top-color: var(--neon); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loader" class="loading-screen">
        <div class="loader-ring"></div>
        <div class="font-[Orbitron] mt-6 tracking-[8px] text-[#00f3ff] animate-pulse text-xs">NEΞUS_INITIATING...</div>
    </div>

    <header>
        <div class="flex items-center gap-3 cursor-pointer" onclick="fireAd(ADS.siteName)">
            <div class="w-10 h-10 bg-white/5 border border-cyan-500/30 rounded-xl flex items-center justify-center rotate-12 transition hover:rotate-0"><i class="fas fa-bolt text-[#00f3ff]"></i></div>
            <span class="font-[Orbitron] font-black text-2xl tracking-tighter text-white">NEΞUS_<span class="text-[#00f3ff]">VØID</span></span>
        </div>
        <div id="timer" class="font-[Orbitron] text-[10px] opacity-40 px-4 py-1 rounded-full border border-white/5">00:00:00</div>
    </header>

    <main class="viewport" id="feed"></main>

    <div id="video-details-ui">
        <div class="p-5 flex justify-between items-center sticky top-0 bg-black/60 backdrop-blur-md z-10">
            <button onclick="closeDetails()" class="text-white hover:text-cyan-400 transition"><i class="fas fa-chevron-right ml-2"></i> عودة للأصل</button>
            <span class="font-[Orbitron] text-[10px] opacity-30 tracking-[4px]">QUANTUM_CORE_v6</span>
        </div>
        <div id="details-render"></div>
    </div>

    <nav>
        <div class="nav-btn upload" id="upload-btn"><i class="fas fa-plus"></i></div>
        <div class="nav-btn" onclick="openAdmin()"><i class="fas fa-fingerprint text-cyan-400"></i></div>
        <div class="nav-btn" onclick="toggleChat()"><i class="fas fa-satellite text-purple-500"></i></div>
    </nav>

    <div id="admin-ui" class="fixed inset-0 bg-black/95 z-[4000] hidden p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10"><h1 class="font-[Orbitron] text-2xl text-cyan-400">CORE_SYNC</h1><i class="fas fa-times text-2xl opacity-30" onclick="closeAdmin()"></i></div>
        <div id="admin-list" class="grid gap-4"></div>
    </div>

    <div id="chat-ui" class="fixed inset-0 bg-black/98 z-[4000] hidden flex-col p-6">
        <div class="flex justify-between mb-6"><span class="font-[Orbitron] text-purple-500">NEΞUS_MESSAGES</span><i class="fas fa-times opacity-30" onclick="toggleChat()"></i></div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-3 mb-4 pr-2"></div>
        <div class="flex gap-2"><input type="text" id="msg-input" class="bg-white/5 flex-1 p-4 rounded-2xl outline-none border border-white/5 focus:border-purple-500" placeholder="أرسل نبضة..."><button onclick="sendMsg()" class="bg-purple-600 px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const USR_ID = "VOID-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        
        const ADS = {
            like: "https://www.effectivegatecpm.com/ywn2a0wz7?key=7433561eca4a0920fafc9d653809bab2",
            share: "https://www.effectivegatecpm.com/f1rpr4x6na?key=3f71d8641b99c667506687ede5ebac90",
            comment: "https://www.effectivegatecpm.com/t3rvmzpu?key=26330eef1cb397212db567d1385dc0b9",
            siteName: "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        };

        function fireAd(link) { window.open(link, '_blank'); }
        setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // جلب المحتوى
        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('feed');
            const data = snap.val(); if(!data) return;
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const card = document.createElement('div');
                card.className = 'nexus-card';
                card.onclick = () => openDetails(id, v);
                card.innerHTML = `
                    <div class="video-engine">
                        <video loop playsinline muted preload="metadata" src="${v.url}"></video>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                    </div>
                    <div class="p-6 flex justify-between items-center">
                        <div class="flex flex-col"><span class="text-[10px] font-[Orbitron] text-cyan-400">ENTRY_${id.substring(1,7)}</span><span class="text-[9px] opacity-40 truncate w-40">${v.desc || "Quantized Stream"}</span></div>
                        <div class="flex items-center gap-2 bg-white/5 px-4 py-2 rounded-full border border-white/5 font-[Orbitron] text-xs"><i class="fas fa-heart text-pink-500"></i> ${v.likes || 0}</div>
                    </div>`;
                feed.appendChild(card);
            });
            observeFeed();
            document.getElementById('loader').style.display = 'none';
        });

        // مشغل مخصص باللمس
        function openDetails(id, v) {
            const ui = document.getElementById('video-details-ui');
            const render = document.getElementById('details-render');
            ui.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            render.innerHTML = `
                <div class="max-w-[800px] mx-auto p-4 pb-32">
                    <div class="video-engine rounded-[35px] border border-white/5 shadow-2xl overflow-hidden" onclick="toggleQuantumPlay()">
                        <video id="quantum-player" playsinline src="${v.url}"></video>
                        <div id="quantum-ui" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 transition"><i class="fas fa-play text-4xl text-cyan-400"></i></div>
                    </div>
                    <div class="flex justify-around my-10 bg-white/2 p-6 rounded-[30px] border border-white/5 shadow-inner">
                        <div class="btn-action" onclick="likeVid(event, '${id}')"><i class="fas fa-atom text-cyan-400 text-2xl"></i><span>${v.likes || 0} نبضة</span></div>
                        <div class="btn-action" onclick="shareVid(event)"><i class="fas fa-share-nodes text-purple-500 text-2xl"></i><span>توزيع</span></div>
                        <div class="btn-action"><i class="fas fa-fingerprint opacity-20 text-2xl"></i><span>آمن</span></div>
                    </div>
                    <div class="px-4">
                        <div class="bg-white/5 p-8 rounded-[35px] border border-white/5 text-sm opacity-70 leading-relaxed shadow-lg mb-10">${v.desc || "تم معالجة هذا المقطع عبر بروتوكولات NEΞUS للجيل القادم."}</div>
                        <div class="bg-white/2 rounded-[40px] p-8 border border-white/5">
                            <h3 class="font-[Orbitron] mb-8 text-cyan-400 cursor-pointer text-xs tracking-[3px]" onclick="fireAd(ADS.comment)">LOG_MESSAGES</h3>
                            <div id="video-comments-${id}" class="space-y-4 max-h-[300px] overflow-y-auto mb-8 pr-4"></div>
                            <div class="flex gap-4 bg-white/5 p-2 rounded-2xl">
                                <input id="comm-input-${id}" class="bg-transparent flex-1 p-3 outline-none text-sm" placeholder="أدخل بصمتك..." onclick="fireAd(ADS.comment)">
                                <button onclick="addComment('${id}')" class="bg-cyan-500 w-12 h-12 rounded-xl text-black"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            const p = document.getElementById('quantum-player'); p.play();
            loadComments(id);
        }

        function toggleQuantumPlay() {
            const p = document.getElementById('quantum-player');
            const ui = document.getElementById('quantum-ui');
            if(p.paused) { p.play(); ui.innerHTML = '<i class="fas fa-pause text-4xl"></i>'; }
            else { p.pause(); ui.innerHTML = '<i class="fas fa-play text-4xl"></i>'; }
            ui.style.opacity = 1; setTimeout(() => ui.style.opacity = 0, 500);
        }

        function closeDetails() { document.getElementById('video-details-ui').style.display = 'none'; document.body.style.overflow = 'auto'; const p = document.getElementById('quantum-player'); if(p) p.pause(); }
        function likeVid(e, id) { e.stopPropagation(); fireAd(ADS.like); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVid(e) { e.stopPropagation(); fireAd(ADS.share); if(navigator.share) navigator.share({url: window.location.href}); }
        function addComment(vidId) {
            const input = document.getElementById(`comm-input-${vidId}`);
            if(!input || !input.value.trim()) return;
            fireAd(ADS.comment); db.ref(`comments/${vidId}`).push({ u: USR_ID, t: input.value }); input.value = '';
        }
        function loadComments(vidId) {
            db.ref(`comments/${vidId}`).on('value', snap => {
                const box = document.getElementById(`video-comments-${vidId}`); if(!box) return; box.innerHTML = '';
                snap.forEach(c => { const d = c.val(); box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-r-2 border-cyan-500 mb-2"><div class="text-[8px] font-[Orbitron] text-cyan-400 mb-1">${d.u}</div><div class="text-sm opacity-90">${d.t}</div></div>`; });
            });
        }

        // تحكم ومزامنة
        function openAdmin() { if(prompt("ENTER_KEY:") === "1234") { renderAdmin(); document.getElementById('admin-ui').style.display = 'block'; } }
        function renderAdmin() {
            db.ref('videos').once('value', s => {
                const b = document.getElementById('admin-list'); b.innerHTML = '';
                s.forEach(child => { const v = child.val(); const id = child.key; b.innerHTML += `<div class="flex items-center gap-4 bg-white/5 p-4 rounded-3xl border border-white/5"><video class="w-16 h-16 rounded-xl object-cover" src="${v.url}"></video><div class="flex-1 text-[10px] opacity-40">${id}</div><button onclick="deleteVid('${id}')" class="text-red-500 bg-red-500/10 p-4 rounded-xl">حذف</button></div>`; });
            });
        }
        function closeAdmin() { document.getElementById('admin-ui').style.display = 'none'; }
        function deleteVid(id) { if(confirm("أكيد؟")) db.ref(`videos/${id}`).remove().then(renderAdmin); }
        function toggleChat() { const c = document.getElementById('chat-ui'); c.style.display = (c.style.display==='flex'?'none':'flex'); }
        function sendMsg() { const i = document.getElementById('msg-input'); if(i.value.trim()) { db.ref('chat').push({u: USR_ID, t: i.value}); i.value = ''; } }
        db.ref('chat').limitToLast(15).on('value', s => {
            const b = document.getElementById('chat-msgs'); b.innerHTML = '';
            s.forEach(m => { const d = m.val(); b.innerHTML += `<div class="bg-white/2 p-4 rounded-2xl border-l-2 border-purple-500 mb-2"><div class="text-[8px] font-[Orbitron] text-purple-400 mb-1">${d.u}</div><div class="text-sm font-light text-white/80">${d.t}</div></div>`; });
            b.scrollTop = b.scrollHeight;
        });

        // رفع نكسوس المباشر
        const widget = cloudinary.createUploadWidget({ cloudName: "dssk5tabb", uploadPreset: "bjebvo5p", sources: ['local'], resourceType: "video", multiple: false }, (err, res) => {
            if(res.event === "uploading") document.getElementById('loader').style.display = 'flex';
            if(!err && res.event === "success") { document.getElementById('loader').style.display = 'none'; const d = prompt("وصف المقطع:"); db.ref('videos').push({ url: res.info.secure_url, likes: 0, desc: d || "" }); }
        });
        document.getElementById('upload-btn').onclick = () => widget.open();

        function observeFeed() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => { const v = e.target.querySelector('video'); if(e.isIntersecting) { v.play().catch(()=>{}); } else { v.pause(); } });
            }, { threshold: 0.1 });
            document.querySelectorAll('.nexus-card').forEach(c => obs.observe(c));
        }
    </script>
</body>
</html>
