<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX | OBSIDIAN PRISM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@500;900&family=Cairo:wght@300;700&display=swap');
        
        :root { --ion: #00fff2; --shadow: rgba(0, 255, 242, 0.4); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; transition: 0.5s ease-in-out; }
        
        /* محرك العرض */
        .vortex-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vortex-engine::-webkit-scrollbar { display: none; }
        .unit { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

        /* العلامة المائية الفاخرة */
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-family: 'Syncopate'; font-size: 4rem; font-weight: 900; opacity: 0.05; pointer-events: none; z-index: 5; color: #fff; white-space: nowrap; }

        /* الهيدر الأيوني */
        .header-glass { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(0,0,0,0.5); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; }
        .neon-title { font-family: 'Syncopate', sans-serif; background: linear-gradient(90deg, #fff, var(--ion)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 15px var(--shadow); }
        .quantum-clock { font-family: 'Orbitron'; font-size: 10px; padding: 4px 12px; background: rgba(255,255,255,0.03); border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); color: var(--ion); }

        /* التحكم الأيسر المركزي */
        .left-prism-hub { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 28px; z-index: 100; }
        .prism-btn { width: 58px; height: 58px; border-radius: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .prism-btn:active { transform: scale(0.8) rotate(-10deg); border-color: var(--ion); box-shadow: 0 0 30px var(--shadow); }
        .prism-btn i { font-size: 22px; color: rgba(255,255,255,0.4); }
        .prism-btn.active i { color: var(--ion); filter: drop-shadow(0 0 8px var(--ion)); }

        /* الناف بار السفلي */
        .bottom-trinity { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 440px; height: 85px; background: rgba(0,0,0,0.8); backdrop-filter: blur(35px); border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .obsidian-upload { width: 72px; height: 72px; background: linear-gradient(135deg, var(--ion), #7d00ff); border-radius: 25px; display: flex; align-items: center; justify-content: center; transform: translateY(-22px) rotate(45deg); box-shadow: 0 15px 35px var(--shadow); border: 2px solid rgba(255,255,255,0.2); animation: pulse 2s infinite; cursor: pointer; }
        .obsidian-upload i { transform: rotate(-45deg); font-size: 26px; color: #000; }

        @keyframes pulse { 0% { box-shadow: 0 15px 35px var(--shadow); } 50% { box-shadow: 0 15px 55px var(--ion); } 100% { box-shadow: 0 15px 35px var(--shadow); } }

        #admin-panel { position: fixed; inset: 0; z-index: 2000; background: #000; display: none; padding: 30px; backdrop-filter: blur(50px); }
    </style>
</head>
<body>

    <header class="header-glass">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold neon-title">VORTEX</h1>
            <div id="clock" class="quantum-clock">00:00:00</div>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-ping"></div>
            <span class="text-[9px] font-black opacity-40 uppercase tracking-[3px]">Apex_Live</span>
        </div>
    </header>

    <main class="vortex-engine" id="stream">
        <div class="h-full flex flex-col items-center justify-center opacity-20">
            <i class="fas fa-circle-notch fa-spin text-4xl mb-4"></i>
            <span class="text-[10px] tracking-[5px]">INITIALIZING_PRISM</span>
        </div>
    </main>

    <nav class="bottom-trinity">
        <div class="flex flex-col items-center opacity-40 hover:opacity-100 transition-all cursor-pointer" onclick="openAdmin()">
            <i class="fas fa-shield-halved text-xl"></i>
            <span class="text-[10px] font-black mt-1 uppercase">Admin</span>
        </div>

        <div class="obsidian-upload" id="upload-btn">
            <i class="fas fa-plus"></i>
        </div>

        <div class="flex flex-col items-center opacity-40 hover:opacity-100 transition-all cursor-pointer" onclick="openChat()">
            <i class="fas fa-comment-nodes text-xl"></i>
            <span class="text-[10px] font-black mt-1 uppercase">Chat</span>
        </div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10 border-b border-white/5 pb-5">
            <h2 class="neon-title text-xl font-bold">MASTER_TERMINAL</h2>
            <i class="fas fa-xmark text-2xl" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-6 overflow-y-auto h-[75vh]"></div>
    </div>

    <script>
        const CORE_ID = localStorage.getItem('v_obs_id') || 'PRISM_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('v_obs_id', CORE_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Quantum Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        // 2. Security System
        function openAdmin() {
            if(prompt("MASTER_CODE:") === "1234") {
                document.getElementById('admin-panel').style.display = 'block';
                loadAdmin();
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function loadAdmin() {
            db.ref('videos').once('value', s => {
                const grid = document.getElementById('admin-grid'); grid.innerHTML = '';
                const vids = s.val(); if(vids) Object.keys(vids).forEach(id => {
                    const el = document.createElement('div'); el.className = 'relative aspect-[9/16] rounded-3xl overflow-hidden border border-white/10 bg-white/5';
                    el.innerHTML = `<video src="${vids[id].url}" class="w-full h-full object-cover"></video>
                                    <div class="absolute inset-0 bg-red-600/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-all cursor-pointer" onclick="deleteEntry('${id}')"><i class="fas fa-trash-can text-2xl"></i></div>`;
                    grid.appendChild(el);
                });
            });
        }
        function deleteEntry(id) { if(confirm('SURE?')) { db.ref(`videos/${id}`).remove(); loadAdmin(); } }

        // 3. Obsidian Upload
        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dssk5tabb", uploadPreset: "bjebvo5p", sources: ['local', 'camera'],
            styles: { palette: { window: "#000", windowBorder: "#00fff2", tabIcon: "#00fff2", action: "#7d00ff", textLight: "#fff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, sender: CORE_ID, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("upload-btn").onclick = () => widget.open();

        // 4. Prism Stream Engine
        db.ref('videos').on('value', (snapshot) => {
            const stream = document.getElementById('stream');
            const data = snapshot.val(); if(!data) return;
            const items = Object.keys(data).map(id => ({ id, ...data[id] })).reverse();
            stream.innerHTML = '';
            
            items.forEach((v) => {
                const sec = document.createElement('section');
                sec.className = 'unit';
                sec.innerHTML = `
                    <div class="watermark">VORTEX ELITE</div>
                    <video loop playsinline src="${v.url}"></video>
                    
                    <div class="left-prism-hub">
                        <div class="prism-btn" onclick="toggleAudio(this)">
                            <i class="fas fa-volume-high"></i>
                        </div>
                        <div class="flex flex-col items-center gap-1" onclick="handleLike('${v.id}')">
                            <div class="prism-btn ${v.likedBy && v.likedBy[CORE_ID] ? 'active' : ''}">
                                <i class="fas fa-heart"></i>
                            </div>
                            <span class="text-[10px] font-bold text-white/40">${v.likes || 0}</span>
                        </div>
                        <div class="prism-btn" onclick="triggerShare()">
                            <i class="fas fa-paper-plane"></i>
                        </div>
                    </div>
                `;
                stream.appendChild(sec);
            });
            initScrollBehavior();
        });

        function toggleAudio(btn) {
            const v = btn.closest('section').querySelector('video');
            v.muted = !v.muted;
            btn.classList.toggle('active', !v.muted);
            btn.querySelector('i').className = v.muted ? 'fas fa-volume-xmark text-red-400' : 'fas fa-volume-high text-cyan-400';
        }

        function initScrollBehavior() {
            const colors = ['#00fff2', '#ff0070', '#00ffaa', '#bf00ff', '#ffea00'];
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const video = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        if(video) video.play().catch(()=>{});
                        // Change Global Ionic Color
                        const randomColor = colors[Math.floor(Math.random() * colors.length)];
                        document.documentElement.style.setProperty('--ion', randomColor);
                        document.documentElement.style.setProperty('--shadow', randomColor + '66');
                    } else { if(video) { video.pause(); video.currentTime = 0; } }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.unit').forEach(s => observer.observe(s));
        }

        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
        function triggerShare() { navigator.share({ title: 'VORTEX OBSIDIAN', url: window.location.href }); }
        function openChat() { alert("Secured Chat is initializing..."); }
    </script>
</body>
</html>
