<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX | APEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Cairo:wght@300;600;900&display=swap');
        
        :root { 
            --apex-glow: #00fff2; 
            --apex-accent: #7d00ff;
            --glass-bg: rgba(10, 10, 10, 0.6);
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #050505; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        
        /* تأثيرات المحرك الخلفي */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; perspective: 1000px; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); transition: 0.5s; }

        /* التصميم الأيوني الزجاجي */
        .apex-ui { background: var(--glass-bg); backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.08); }
        .apex-text { font-family: 'Syncopate', sans-serif; background: linear-gradient(to right, #00fff2, #7d00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px rgba(0,255,242,0.4)); }

        /* زر الرفع الفخم */
        .pulse-upload {
            position: fixed; bottom: 100px; right: 25px; width: 70px; height: 70px;
            background: linear-gradient(135deg, #00fff2, #7d00ff);
            border-radius: 24px; display: flex; align-items: center; justify-content: center;
            z-index: 1000; box-shadow: 0 10px 30px rgba(0, 255, 242, 0.3);
            animation: pulse-glow 2s infinite; cursor: pointer;
        }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 242, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(0, 255, 242, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 242, 0); } }

        /* شريط الـ XP الأيوني */
        .xp-line { position: fixed; top: 68px; left: 0; height: 1.5px; background: linear-gradient(to right, transparent, var(--apex-glow), transparent); transition: 1s; z-index: 250; }

        .side-action { width: 55px; height: 55px; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; transition: 0.3s; }
        .side-action:active { transform: scale(0.85); background: rgba(0, 255, 242, 0.1); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-[300] apex-ui p-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border border-emerald-500/30 flex items-center justify-center bg-black">
                <i class="fas fa-microchip text-[10px] text-emerald-400"></i>
            </div>
            <div class="flex flex-col">
                <span id="level-tag" class="text-[8px] font-bold tracking-[2px] opacity-60">SYSTEM_ONLINE</span>
                <span class="text-[10px] font-black text-emerald-400">APEX v2.0</span>
            </div>
        </div>
        <h1 class="text-xl font-bold apex-text tracking-widest cursor-pointer" onclick="triggerAdmin()">APEX</h1>
        <div class="w-10 h-10 flex items-center justify-center opacity-40"><i class="fas fa-wifi text-xs"></i></div>
    </header>

    <div id="xp-bar" class="xp-line" style="width: 0%;"></div>

    <div id="upload-trigger" class="pulse-upload">
        <i class="fa-solid fa-plus text-2xl text-black"></i>
    </div>

    <main class="scroll-engine" id="video-stack">
        <div class="h-full flex flex-col items-center justify-center">
            <div class="w-20 h-20 border-2 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
            <span class="mt-6 text-[10px] tracking-[6px] uppercase opacity-40 animate-pulse">Initializing_Apex_Stream</span>
        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-[450px] h-20 apex-ui rounded-[35px] flex justify-around items-center z-[300] border border-white/10">
        <i class="fa-solid fa-house-chimney-window text-xl text-emerald-400"></i>
        <i class="fa-solid fa-message opacity-30" onclick="toggleChat()"></i>
        <div class="absolute -top-1 w-12 h-1 bg-emerald-500 shadow-[0_0_10px_#00fff2] rounded-full"></div>
        <i class="fa-solid fa-paper-plane opacity-30" onclick="shareVideo()"></i>
        <i class="fa-solid fa-crown opacity-30" onclick="openAd()"></i>
    </nav>

    <div id="admin-terminal" class="fixed inset-0 z-[1000] hidden bg-black/98 backdrop-blur-3xl p-6">
        <div class="flex justify-between items-center border-b border-white/10 pb-4">
            <span class="apex-text font-bold">TERMINAL_v2.0</span>
            <button onclick="closeAdmin()" class="bg-white/5 px-4 py-2 rounded-xl text-xs">EXIT</button>
        </div>
        <div id="admin-grid" class="grid grid-cols-2 gap-4 mt-6 h-[80vh] overflow-y-auto"></div>
    </div>

    <script>
        const SHADOW_ID = localStorage.getItem('apex_uid') || 'CORE_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('apex_uid', SHADOW_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Admin Protocol
        function triggerAdmin() {
            const code = prompt("IDENTITY VERIFICATION:");
            if(code === "1234") {
                document.getElementById('admin-terminal').classList.remove('hidden');
                refreshAdmin();
            }
        }
        function closeAdmin() { document.getElementById('admin-terminal').classList.add('hidden'); }

        function refreshAdmin() {
            db.ref('videos').once('value', s => {
                const grid = document.getElementById('admin-grid');
                grid.innerHTML = '';
                const vids = s.val();
                if(vids) {
                    Object.keys(vids).forEach(id => {
                        const div = document.createElement('div');
                        div.className = 'relative aspect-[9/16] rounded-2xl overflow-hidden border border-white/5';
                        div.innerHTML = `
                            <video src="${vids[id].url}" class="w-full h-full object-cover"></video>
                            <div class="absolute inset-0 bg-red-600/60 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity cursor-pointer" onclick="deleteEntry('${id}')">
                                <i class="fas fa-trash text-2xl"></i>
                            </div>
                        `;
                        grid.appendChild(div);
                    });
                }
            });
        }

        function deleteEntry(id) { if(confirm('SURE?')) { db.ref(`videos/${id}`).remove(); refreshAdmin(); } }

        // Cloudinary Elite Upload
        const CLOUD_NAME = "dssk5tabb", UPLOAD_PRESET = "bjebvo5p";
        const widget = cloudinary.createUploadWidget({ 
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET,
            sources: ['local', 'camera'],
            clientAllowedFormats: ["video"],
            styles: { palette: { window: "#050505", sourceBg: "#050505", windowBorder: "#00fff2", link: "#00fff2", action: "#7d00ff", inactiveTabIcon: "#ffffff", textDark: "#000000", textLight: "#ffffff", theme: "black" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, sender: SHADOW_ID, likes: 0, timestamp: Date.now() });
                document.getElementById('xp-bar').style.width = "100%";
                setTimeout(() => document.getElementById('xp-bar').style.width = "10%", 2000);
            }
        });
        document.getElementById("upload-trigger").onclick = () => { widget.open(); };

        // Data Engine
        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('video-stack');
            const data = snapshot.val();
            if(!data) return;
            
            const items = Object.keys(data).map(id => ({ id, ...data[id] })).reverse();
            container.innerHTML = '';
            
            items.forEach((v) => {
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <video loop playsinline src="${v.url}"></video>
                    <div class="absolute left-6 bottom-32 flex flex-col z-[100]">
                        <div class="side-action apex-ui" onclick="toggleLike('${v.id}')">
                            <i class="fa-solid fa-heart text-lg ${v.likedBy && v.likedBy[SHADOW_ID] ? 'text-red-500' : 'text-white/40'}"></i>
                            <span class="text-[9px] mt-1 font-bold">${v.likes || 0}</span>
                        </div>
                        <div class="side-action apex-ui" onclick="toggleChat()">
                            <i class="fa-solid fa-comment-dots text-white/40 text-lg"></i>
                        </div>
                        <div class="side-action apex-ui" onclick="shareVideo()">
                            <i class="fa-solid fa-share-nodes text-white/40 text-lg"></i>
                        </div>
                    </div>
                    <div class="absolute right-6 bottom-36 opacity-20 pointer-events-none">
                        <span class="text-[9px] font-bold tracking-[8px] uppercase rotate-90 block" style="writing-mode: vertical-rl;">SYSTEM_STREAM</span>
                    </div>
                `;
                container.appendChild(section);
            });
            initScroll();
        });

        function initScroll() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { if(v) v.play().catch(()=>{}); }
                    else { if(v) { v.pause(); v.currentTime = 0; } }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
        function shareVideo() { navigator.share({ title: 'APEX ELITE', url: window.location.href }); }
        function openAd() { window.open("https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d", "_blank"); }
    </script>
</body>
</html>
